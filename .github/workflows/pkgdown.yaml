# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  # Daily retry while the HTRC EF solr outage lasts (down since ~2026-07-09):
  # the articles execute workset_builder() at render time, so the site can
  # only build when that backend answers. The probe job below makes scheduled
  # runs skip quietly (green) while it is down; the day it recovers, the site
  # builds and deploys automatically. Safe to remove once the site is green.
  schedule:
    - cron: '43 20 * * *'
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  # Gate for scheduled runs only: skip the build (successfully) while the
  # HTRC EF solr backend is down. Push/PR/dispatch runs build unconditionally.
  probe:
    runs-on: ubuntu-latest
    outputs:
      htrc_up: ${{ steps.probe.outputs.up }}
    steps:
      - id: probe
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "up=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://solr2.htrc.illinois.edu/robust-solr8/solr345678-faceted-htrc-full-ef2-shards24x2/admin/ping" || echo 000)
          echo "HTRC EF solr admin/ping: $code"
          if [ "$code" = "200" ]; then
            echo "up=true" >> "$GITHUB_OUTPUT"
            echo "✅ HTRC EF solr is UP (ping $code) — building and deploying the site." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "up=false" >> "$GITHUB_OUTPUT"
            echo "⏭️ HTRC EF solr still down (ping $code) — site build skipped. Green here means 'nothing to do', NOT a successful build; a real build takes minutes, not seconds." >> "$GITHUB_STEP_SUMMARY"
          fi

  pkgdown:
    needs: probe
    if: needs.probe.outputs.htrc_up == 'true'
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      # TEMPORARY debug step: surfaces quarto's real stderr, which
      # build_site_github_pages swallows ("Rerun with quiet = FALSE").
      # Remove once the article build is green.
      - name: Build articles verbosely (debug)
        run: pkgdown::build_articles(pkg = ".", quiet = FALSE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
